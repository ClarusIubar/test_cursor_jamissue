services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: jamissyu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - jamissyu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jamissyu"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  jamissyu_pgdata:

